{% extends "_layout.html" %}
{% load static %}
{% block content %}
<h3 class="center-align">Когнітивний Перекладач Azure</h3>

<div class="row">
    <div class="col s12 m6">
        <div class="card">
            <div class="card-content">
                <span class="card-title">Оригинальный текст</span>
                <div class="input-field">
                    <textarea id="sourceText" class="materialize-textarea" placeholder="Нажмите 'Слушать' или введите текст..."></textarea>
                </div>
            </div>
            <div class="card-action">
                <button class="btn waves-effect waves-light" onclick="startDictation(this)">
                    <i class="material-icons left">mic</i>Слушать
                </button>
                <button class="btn-flat waves-effect waves-dark right" onclick="speakText('sourceText', 'ru-RU')" title="Озвучить оригинал">
                    <i class="material-icons">volume_up</i>
                </button>
            </div>
        </div>
    </div>

    <div class="col s12 m6">
        <div class="card">
            <div class="card-content">
                <span class="card-title">Перевод</span>
                
                <div class="input-field">
                    <select id="targetLang">
                        <option value="en" selected>Английский</option>
                        <option value="fr">Французский</option>
                        <option value="de">Немецкий</option>
                    </select>
                    <label>Язык перевода</label>
                </div>
                
                <div class="input-field">
                    <textarea id="translatedText" class="materialize-textarea" readonly placeholder="Здесь появится перевод..."></textarea>
                </div>
            </div>
            <div class="card-action">
                <button class="btn waves-effect waves-light blue" onclick="translateText()">
                    <i class="material-icons left">translate</i>Перевести
                </button>
                <button class="btn-flat waves-effect waves-dark right" onclick="speakText('translatedText', 'en-US')" title="Озвучить перевод">
                    <i class="material-icons">volume_up</i>
                </button>
            </div>
        </div>
    </div>
</div>
{% endblock content %}

{% block extra_js %}
    <script src="{% static 'js/ui.js' %}"></script>
    <script src="{% static 'js/api.js' %}"></script>
{% endblock extra_js %}
